spring:
  application:
    name: backend-service
  # Graceful shutdown: stop accepting new requests, let in-flight ones finish (up to the timeout).
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful

# ── Operational excellence ────────────────────────────────────────────────
# Native structured logging (Spring Boot >= 3.4): one JSON object per console line in Elastic
# Common Schema. Alternative built-in formats: `logstash`, `gelf`. No logback XML required.
logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        # Expose the operational endpoints (kept off by default for safety).
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      # Adds /actuator/health/liveness and /actuator/health/readiness probe groups (k8s-style).
      probes:
        enabled: true
  info:
    env:
      enabled: true

# Surfaced verbatim at /actuator/info.
info:
  app:
    name: backend-service
    description: Staff-prep backend — LLD katas + operational excellence layer
    pillars: logs, metrics, traces, health, graceful-shutdown
