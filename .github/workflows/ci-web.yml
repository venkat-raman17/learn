name: CI — Web & GraphQL

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "web/**"
      - "graphql-layer/**"
      - "expo-app/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "web/**"
      - "graphql-layer/**"
      - "expo-app/**"
      - ".github/workflows/ci-web.yml"

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── spa-react-vite — Vitest unit tests + type-check ─────────────────────────
  spa-vite:
    name: spa-react-vite (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/spa-react-vite

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/spa-react-vite/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --run

  # ── GraphQL server — TypeScript type-check ───────────────────────────────────
  graphql-server:
    name: graphql-layer/server (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: graphql-layer/server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: graphql-layer/server/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ── GraphQL client — TypeScript type-check + Vite build ─────────────────────
  graphql-client:
    name: graphql-layer/client (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: graphql-layer/client

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: graphql-layer/client/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  # ── Other web apps — build verification ─────────────────────────────────────
  web-builds:
    name: web/${{ matrix.app }} build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # keep other apps building even if one fails
      matrix:
        app:
          - nextjs-app
          - react-router-app
          - astro-app
          # ssr-tanstack-start excluded: needs .env config to build

    defaults:
      run:
        working-directory: web/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/${{ matrix.app }}/package-lock.json

      - run: npm ci
      - run: npm run build

  # ── Expo — TypeScript type-check ─────────────────────────────────────────────
  expo:
    name: expo-app (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo-app

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: expo-app/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
