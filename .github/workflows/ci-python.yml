name: CI — Python

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "mcp-server-py/**"
      - "agentic-python/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "mcp-server-py/**"
      - "agentic-python/**"
      - ".github/workflows/ci-python.yml"

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── MCP knowledge server (FastMCP + TF-IDF RAG) ─────────────────────────────
  mcp-server:
    name: MCP server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server-py

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -v

  # ── Agentic RAG (LangGraph + MCP client) ────────────────────────────────────
  agentic:
    name: Agentic-python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentic-python

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      # Path dep on mcp-server-py resolved by uv via tool.uv.sources in pyproject.toml
      - name: Sync dependencies
        run: uv sync

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -v
