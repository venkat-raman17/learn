name: CI — Java

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "backend-service/**"
      - "dsa-java/**"
      - ".github/workflows/ci-java.yml"
  pull_request:
    paths:
      - "backend-service/**"
      - "dsa-java/**"
      - ".github/workflows/ci-java.yml"

concurrency:
  group: ci-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── DSA (data structures + NeetCode stubs) ──────────────────────────────────
  dsa:
    name: DSA Java tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dsa-java

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test -B

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dsa-surefire-reports
          path: dsa-java/target/surefire-reports/

  # ── Backend service (Spring Boot WebFlux + LLD katas + ops layer) ───────────
  backend:
    name: Backend-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # Unit + integration tests that do NOT need Docker.
      # Datastore integration tests are @Disabled (need postgres+mongodb).
      - name: Run tests
        run: ./mvnw test -B

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend-service/target/surefire-reports/

  # ── Integration tests (needs Docker) ────────────────────────────────────────
  # Runs on push to main only — too slow for every PR branch.
  backend-integration:
    name: Backend integration tests (Docker)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_password
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval db.adminCommand('ping')"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run integration tests
        run: >
          ./mvnw test -B
          -Dspring.profiles.active=datastore
          -Dgroups=integration
